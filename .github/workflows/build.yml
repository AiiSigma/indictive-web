name: Build Sync XxX APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: pip install Pillow

      - name: Prepare and Generate App Icons
        run: |
          set -eux

          echo "Listing workspace for debugging"
          ls -la || true

          # Find a zip file yang ada di repository
          ZIPFILE=$(find . -maxdepth 3 -type f \( -iname "*base*.zip" -o -iname "*phishing*.zip" -o -iname "*.zip" \) | head -n 1 || true)

          if [ -n "$ZIPFILE" ]; then
            echo "Found zip: [$ZIPFILE]"
            mkdir -p extracted
            unzip -o "$ZIPFILE" -d extracted
          fi

          echo "Contents of extracted/:"
          ls -la extracted || true

          # Cari file JPG sebagai sumber ikon (sync.jpg, instagram.jpg, dll)
          ICON_PATH=$(find extracted . -maxdepth 6 -type f \( -iname "sync.jpg" -o -iname "icon*.jpg" -o -iname "*.jpg" \) | head -n 1 || true)

          # Juga cek lokasi umum di repo
          if [ -z "$ICON_PATH" ]; then
            for p in "extracted/sync.jpg" "assets/sync.jpg" "sync.jpg" "instagram.jpg"; do
              if [ -f "$p" ]; then
                ICON_PATH="$p"
                break
              fi
            done
          fi

          if [ -z "$ICON_PATH" ]; then
            echo "No icon file found!"
            echo "Available files:" 
            ls -la extracted || true
            exit 1
          fi

          echo "Using icon source: $ICON_PATH"

          # Jalankan script generator dengan file JPG
          ICON_SOURCE="$ICON_PATH" OUT_DIR=android/app/src/main/res python3 extracted/generate_icons.py

      - name: Setup Gradle Wrapper
        run: |
          curl -L -o android/gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar"
          chmod +x android/gradlew

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mkdir -p output
          find android/app/build/outputs/apk/release/ -name "*.apk" | head -1 | xargs -I{} cp {} output/SyncXxX.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CyberPro-APK
          path: output/SyncXxX.apk
          retention-days: 30
