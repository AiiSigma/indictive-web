name: Build Sync XxX APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug - List repo contents
        run: |
          echo "=== Root directory ==="
          ls -la
          echo "=== Find zip files ==="
          find . -name "*.zip" -type f

      - name: Unzip project
        run: |
          ZIP_FILE=$(find . -name "*.zip" -type f | head -1)
          echo "Found zip: $ZIP_FILE"

          mkdir -p _project
          unzip -o "$ZIP_FILE" -d _project

          echo "=== Contents after unzip ==="
          ls -la _project/

          # Cari folder root project (yang ada build.gradle, bukan di app/ atau build/)
          PROJECT_DIR=$(find _project -name "build.gradle" -not -path "*/app/*" -not -path "*/build/*" | head -1 | xargs dirname)
          echo "Project root detected: $PROJECT_DIR"

          # Pastikan file gradle wrapper ada sebelum di-copy
          if [ ! -f "$PROJECT_DIR/gradlew" ]; then
            echo "ERROR: File gradlew tidak ditemukan di $PROJECT_DIR"
            find "$PROJECT_DIR" -name "gradlew" -type f
            exit 1
          fi

          rm -f *.zip
          cp -rf "$PROJECT_DIR"/. .
          
          # Set permission untuk gradlew setelah copy
          chmod +x gradlew
          rm -rf _project

          echo "=== Final root contents ==="
          ls -la
          echo "=== Verifikasi gradle wrapper ==="
          ls -la gradle/wrapper/ 2>/dev/null || echo "Folder gradle/wrapper tidak ditemukan"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: pip install Pillow

      - name: Generate App Icons
        run: |
          if [ -f generate_icons.py ]; then
            python3 generate_icons.py
          else
            echo "generate_icons.py tidak ditemukan, skip."
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename APK
        run: |
          mkdir -p output
          find app/build/outputs/apk/release/ -name "*.apk" | head -1 | xargs -I{} cp {} output/SyncXxX.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CyberPro-APK
          path: output/SyncXxX.apk
          retention-days: 30
