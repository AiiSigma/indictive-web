name: Build Sync XxX APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ═══════════════════════════════════════════
      #  EXTRACT ZIP — ini step yang tadi kurang
      # ═══════════════════════════════════════════
      - name: Extract Project Files from ZIP
        run: |
          set -eux

          # Cari file zip di repo
          ZIPFILE=$(find . -maxdepth 3 -type f -iname "*.zip" | head -n 1 || true)

          if [ -z "$ZIPFILE" ]; then
            echo "::warning::No zip file found, assuming files already extracted"
            exit 0
          fi

          echo "Found zip: $ZIPFILE"
          unzip -o "$ZIPFILE" -d ./

          echo "Extracted files:"
          ls -la ./*.py ./*.jpg android/app/build.gradle 2>/dev/null || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── Icon Generation ──
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow & Generate Icons
        run: |
          pip install Pillow
          python3 generate_icons.py

      # ── Gradle Setup ──
      - name: Setup Gradle Wrapper
        run: |
          cd android

          if [ -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "gradle-wrapper.jar already exists, skipping download"
          else
            echo "gradle-wrapper.jar not found, downloading Gradle 8.4..."
            wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
            unzip -q /tmp/gradle.zip -d /tmp/
            /tmp/gradle-8.4/bin/gradle wrapper --gradle-version 8.4
            echo "Gradle wrapper generated successfully"
          fi

          chmod +x gradlew
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      # ── Build ──
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename & Verify APK
        run: |
          mkdir -p output

          APK=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -1)

          if [ -z "$APK" ]; then
            echo "::error::APK not found in build output!"
            echo "Contents of build/outputs:"
            find android/app/build/outputs/ -type f || true
            exit 1
          fi

          cp "$APK" output/SyncXxX.apk
          echo "APK built successfully: $(du -h output/SyncXxX.apk | cut -f1)"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CyberPro-APK
          path: output/SyncXxX.apk
          retention-days: 30
