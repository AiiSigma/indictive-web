name: Build Sync XxX APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: pip install Pillow

      - name: Download base artifact (optional)
        uses: actions/download-artifact@v4
        with:
          name: base
          path: base
        continue-on-error: true

      - name: Prepare and Generate App Icons
        run: |
          set -eux

          echo "Listing workspace for debugging"
          ls -la || true

          # Find a zip file that may have been uploaded (handles names with spaces)
          ZIPFILE=$(find . -maxdepth 3 -type f \( -iname "*base*.zip" -o -iname "*phishing*.zip" -o -iname "*.zip" \) | head -n 1 || true)

          if [ -n "$ZIPFILE" ]; then
            echo "Found zip: [$ZIPFILE]"
            mkdir -p extracted
            unzip -o "$ZIPFILE" -d extracted
          else
            echo "No zip file found in workspace. Checking ./base/ (download-artifact) and repo files."
            if [ -d base ]; then
              echo "Using downloaded artifact in ./base"
              mkdir -p extracted
              cp -r base/* extracted/ || true
            fi
          fi

          echo "Contents of extracted/:"
          ls -la extracted || true

          # Find candidate PNG icons (adjust patterns if you use .webp or different names)
          ICON_PATH=$(find extracted . -maxdepth 6 -type f \( -iname "icon*.png" -o -iname "*launcher*.png" -o -iname "*.png" \) | head -n 1 || true)

          # Also check common repo locations
          if [ -z "$ICON_PATH" ]; then
            for p in "assets/icon.png" "icon.png" "android/app/src/main/res/icon.png"; do
              if [ -f "$p" ]; then
                ICON_PATH="$p"
                break
              fi
            done
          fi

          if [ -z "$ICON_PATH" ]; then
            echo "No PNG icon found in extracted/ or repo — failing because icon is required."
            echo "Show some helpful listings for debugging:" 
            ls -la . || true
            find . -maxdepth 4 -type f -name "*.png" -print || true
            exit 1
          fi

          echo "Using icon source: $ICON_PATH"

          # Run the generator script with explicit env vars. Script reads ICON_SOURCE and OUT_DIR.
          ICON_SOURCE="$ICON_PATH" OUT_DIR=android/app/src/main/res python3 generate_icons.py

      - name: Setup Gradle Wrapper
        run: |
          curl -L -o android/gradle/wrapper/gradle-wrapper.jar \
            "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar"
          chmod +x android/gradlew

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mkdir -p output
          find android/app/build/outputs/apk/release/ -name "*.apk" | head -1 | xargs -I{} cp {} output/SyncXxX.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CyberPro-APK
          path: output/SyncXxX.apk
          retention-days: 30
