name: Build Sync XxX APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── Icon Generation ──
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow & Generate Icons
        run: |
          pip install Pillow
          python3 generate_icons.py

      # ── Gradle Setup (FIX: download gradle langsung, generate wrapper) ──
      - name: Setup Gradle Wrapper
        run: |
          cd android

          # Cek apakah gradle-wrapper.jar sudah ada
          if [ -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "gradle-wrapper.jar already exists, skipping download"
          else
            echo "gradle-wrapper.jar not found, downloading Gradle 8.4 to generate it..."

            # Download Gradle distribution dari source resmi
            wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip

            # Extract ke folder sementara
            unzip -q /tmp/gradle.zip -d /tmp/

            # Generate wrapper menggunakan gradle yang baru di-download
            /tmp/gradle-8.4/bin/gradle wrapper --gradle-version 8.4

            echo "Gradle wrapper generated successfully"
          fi

          # Pastikan gradlew executable
          chmod +x gradlew

          # Tulis local.properties dengan SDK path yang benar
          echo "sdk.dir=$ANDROID_HOME" > local.properties

      # ── Build ──
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename & Verify APK
        run: |
          mkdir -p output

          APK=$(find android/app/build/outputs/apk/release/ -name "*.apk" | head -1)

          if [ -z "$APK" ]; then
            echo "::error::APK not found in build output!"
            echo "Contents of build/outputs:"
            find android/app/build/outputs/ -type f || true
            exit 1
          fi

          cp "$APK" output/SyncXxX.apk
          echo "✅ APK built successfully: $(du -h output/SyncXxX.apk | cut -f1)"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CyberPro-APK
          path: output/SyncXxX.apk
          retention-days: 30
