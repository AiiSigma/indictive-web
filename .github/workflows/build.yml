name: Build Sync XxX APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug - List repo contents
        run: |
          echo "=== Root directory ==="
          ls -la
          echo "=== Find zip files ==="
          find . -name "*.zip" -type f

      - name: Unzip project
        run: |
          ZIP_FILE=$(find . -name "*.zip" -type f | head -1)
          
          if [ -z "$ZIP_FILE" ]; then
            echo "ERROR: File ZIP tidak ditemukan!"
            exit 1
          fi
          
          echo "Found zip: $ZIP_FILE"

          mkdir -p _project
          unzip -o "$ZIP_FILE" -d _project

          echo "=== Contents after unzip ==="
          ls -la _project/

          # Cari folder root project (yang ada build.gradle, bukan di app/ atau build/)
          PROJECT_DIR=$(find _project -name "build.gradle" -not -path "*/app/*" -not -path "*/build/*" | head -1 | xargs dirname)
          
          if [ -z "$PROJECT_DIR" ]; then
            echo "ERROR: Tidak menemukan folder project dengan build.gradle"
            find _project -name "build.gradle" -type f
            exit 1
          fi
          
          echo "Project root detected: $PROJECT_DIR"

          # Verifikasi file gradle wrapper jar ada
          if [ ! -f "$PROJECT_DIR/gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "ERROR: File gradle-wrapper.jar tidak ditemukan di $PROJECT_DIR/gradle/wrapper/"
            echo "Mencari file gradle-wrapper.jar..."
            find "$PROJECT_DIR" -name "gradle-wrapper.jar" -type f
            echo ""
            echo "WARNING: Mendownload gradle-wrapper.jar dari Gradle..."
            # Download gradle-wrapper.jar jika tidak ada
            mkdir -p gradle/wrapper
            wget -q https://repo.gradle.org/gradle/gradle-wrapper/gradle-wrapper.jar -O "$PROJECT_DIR/gradle/wrapper/gradle-wrapper.jar"
            if [ $? -ne 0 ]; then
              echo "ERROR: Gagal download gradle-wrapper.jar"
              exit 1
            fi
          fi

          # Pastikan file gradlew ada sebelum di-copy
          if [ ! -f "$PROJECT_DIR/gradlew" ]; then
            echo "ERROR: File gradlew tidak ditemukan di $PROJECT_DIR"
            find "$PROJECT_DIR" -name "gradlew" -type f
            exit 1
          fi

          rm -f *.zip
          cp -rf "$PROJECT_DIR"/. .
          
          # Set permission untuk gradlew setelah copy
          chmod +x gradlew
          rm -rf _project

          echo "=== Final root contents ==="
          ls -la
          echo ""
          echo "=== Verifikasi gradle wrapper ==="
          if [ -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "✓ gradle-wrapper.jar ditemukan"
            ls -lh gradle/wrapper/gradle-wrapper.jar
          else
            echo "✗ ERROR: gradle-wrapper.jar TIDAK ditemukan!"
            exit 1
          fi
          
          if [ -f gradlew ]; then
            echo "✓ gradlew ditemukan"
            file gradlew
          else
            echo "✗ ERROR: gradlew TIDAK ditemukan!"
            exit 1
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: pip install Pillow

      - name: Generate App Icons
        run: |
          if [ -f generate_icons.py ]; then
            python3 generate_icons.py
          else
            echo "generate_icons.py tidak ditemukan, skip."
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build Release APK
        run: |
          echo "Verifying gradlew executable..."
          file ./gradlew
          ./gradlew assembleRelease --stacktrace

      - name: Rename APK
        run: |
          mkdir -p output
          find app/build/outputs/apk/release/ -name "*.apk" | head -1 | xargs -I{} cp {} output/SyncXxX.apk
          echo "APK successfully created at output/SyncXxX.apk"
          ls -lh output/

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CyberPro-APK
          path: output/SyncXxX.apk
          retention-days: 30

      - name: Build Status
        if: success()
        run: echo "✓ Build berhasil! APK siap di-download."

      - name: Build Failed
        if: failure()
        run: echo "✗ Build gagal. Periksa log di atas untuk detail error."
